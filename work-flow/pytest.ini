[pytest]
# pytest配置文件
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    -ra

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    e2e: 端到端测试
    slow: 慢速测试
    playwright: Playwright浏览器测试

# Playwright配置
base_url = http://localhost:8123
browser_channel = chrome
headless = false
screenshot = only-on-failure
video = retain-on-failure
trace = retain-on-failure